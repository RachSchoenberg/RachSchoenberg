<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rachel Schoenberg — Skills</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f8f6; color: #1a1a1a; padding: 32px 16px; min-height: 100vh; }
  .container { max-width: 860px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #e5e3de; }
  .avatar { width: 56px; height: 56px; border-radius: 50%; background: #dbeafe; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 600; color: #1e40af; flex-shrink: 0; }
  .header-text h1 { font-size: 20px; font-weight: 600; margin-bottom: 3px; }
  .header-text p { font-size: 13px; color: #6b6b6b; }
  .back-link { margin-left: auto; font-size: 13px; color: #378ADD; text-decoration: none; }
  .back-link:hover { text-decoration: underline; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat { background: #fff; border: 1px solid #e5e3de; border-radius: 10px; padding: 14px 16px; }
  .stat-label { font-size: 11px; color: #9b9b9b; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 560px) { .charts { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(3,1fr); } }
  .card { background: #fff; border: 1px solid #e5e3de; border-radius: 12px; padding: 18px; }
  .card-title { font-size: 11px; font-weight: 600; color: #9b9b9b; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px; }
  .chart-wrap { position: relative; height: 220px; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 12px; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6b6b6b; }
  .leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .tooltip-note { font-size: 11px; color: #b0b0b0; text-align: center; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">RS</div>
    <div class="header-text">
      <h1>Rachel Schoenberg</h1>
      <p>MS Data Science · Northeastern University · Portland, ME</p>
    </div>
    <a class="back-link" href="https://github.com/RachSchoenberg">GitHub profile</a>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Repos</div><div class="stat-val">5</div></div>
    <div class="stat"><div class="stat-label">Hard skills</div><div class="stat-val">15</div></div>
    <div class="stat"><div class="stat-label">Soft skills</div><div class="stat-val">10</div></div>
  </div>

  <div class="charts">
    <div class="card">
      <div class="card-title">Hard skills by category</div>
      <div class="chart-wrap"><canvas id="hardChart"></canvas></div>
      <div class="legend" id="hardLegend"></div>
    </div>
    <div class="card">
      <div class="card-title">Soft skills</div>
      <div class="chart-wrap"><canvas id="softChart"></canvas></div>
      <div class="legend" id="softLegend"></div>
    </div>
  </div>

  <p class="tooltip-note">Hover over any slice to see individual skills</p>
</div>

<script>
const hardData = {
  labels: ['Languages','Data & ML','Visualization','Cloud & APIs','Databases','Geospatial','BI & Reporting'],
  values: [4, 5, 3, 3, 3, 2, 3],
  colors: ['#378ADD','#185FA5','#85B7EB','#639922','#97C459','#C0DD97','#0C447C'],
  detail: [
    'Python, SQL, JS, HTML/CSS',
    'Pandas, NumPy, scikit-learn, NLP, K-Means',
    'Plotly, Seaborn, D3.js',
    'AWS S3, REST APIs, Clio API',
    'PostgreSQL, Supabase, Clio',
    'GeoPandas, ArcGIS',
    'Power BI, Power Query, Excel'
  ]
};
const softData = {
  labels: ['Communication','Leadership','Teaching','Collaboration','Analytical'],
  values: [2, 2, 2, 2, 2],
  colors: ['#D4537E','#ED93B1','#F4C0D1','#FAC775','#EF9F27'],
  detail: [
    'Stakeholder comms, data storytelling',
    'Team lead, client-facing delivery',
    'Mentoring, curriculum design',
    'Cross-functional, adaptability',
    'Problem framing, attention to detail'
  ]
};

function buildChart(id, legendId, data) {
  new Chart(document.getElementById(id), {
    type: 'doughnut',
    data: {
      labels: data.labels,
      datasets: [{
        data: data.values,
        backgroundColor: data.colors,
        borderWidth: 2,
        borderColor: '#fff',
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (c) => '  ' + c.label + ': ' + data.detail[c.dataIndex]
          }
        }
      }
    }
  });
  const leg = document.getElementById(legendId);
  data.labels.forEach((l, i) => {
    leg.innerHTML += `<span class="leg-item"><span class="leg-dot" style="background:${data.colors[i]}"></span>${l}</span>`;
  });
}

buildChart('hardChart', 'hardLegend', hardData);
buildChart('softChart', 'softLegend', softData);
</script>
</body>
</html>
